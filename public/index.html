<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Office</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔴 TOP RIBBON -->
<div class="ribbon">
  <button>📄 File</button>
  <button>✏️ Edit</button>
  <button>🤖 AI</button>
  <button onclick="saveFile()">💾 Save</button>
  <button onclick="createPDF()">📥 Export PDF</button>
</div>

<div class="container">

  <!-- 🔴 SIDEBAR -->
  <div class="sidebar">
    <h2>AI Office</h2>
    <button onclick="showTab('editor')">📄 Editor</button>
    <button onclick="showTab('ai')">🤖 AI Tools</button>
  </div>

  <!-- 🔴 MAIN WORKSPACE -->
  <div class="workspace">

    <!-- EDITOR -->
    <div id="editor" class="tab">
      <input type="file" onchange="uploadFile(event)">
      <div id="preview" contenteditable="true"></div>
    </div>

    <!-- AI -->
    <div id="ai" class="tab">
      <textarea id="input"></textarea>

      <div class="ai-controls">
        <select id="action">
          <option value="summarize">Summarize</option>
          <option value="rewrite">Rewrite</option>
          <option value="grammar">Fix Grammar</option>
        </select>

        <button onclick="runAI()">⚡ Run AI</button>
      </div>

      <div id="output"></div>

      <button onclick="applyToEditor()">Apply</button>
      <button onclick="useEditorText()">Use Editor</button>
    </div>

  </div>
</div>

<!-- 🔴 FILE PANEL -->
<div class="file-panel">
  <h3>📂 Files</h3>
  <ul id="fileList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
